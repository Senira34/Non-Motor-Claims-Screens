<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outstanding Updates - Insurance Claims Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { teal: { brand: '#00ADBB', dark: '#008f9b', light: '#e0f7f9' } }, fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; }
        body { min-height: 100vh; font-family: 'Inter', system-ui, sans-serif; }
        .glass-sidebar { background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 4px 0 24px rgba(0, 0, 0, 0.15); }
        .glass-topbar { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 173, 187, 0.15); box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08); }
        .glass-main { background: rgba(248, 252, 253, 0.97); }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-radius: 10px; cursor: pointer; transition: all 0.2s ease; color: black; font-size: 13.5px; font-weight: 500; margin: 2px 8px; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.18); }
        .nav-item.active { background: #00ADBB; color: white; font-weight: 600; box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12); }
        .nav-item svg { flex-shrink: 0; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #00ADBB, #006b75); display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; font-size: 13px; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 173, 187, 0.3); border-radius: 4px; }
    </style>
</head>
<body>
    <div style="display:flex; height:100vh; overflow:hidden;">

        <!-- ── SIDEBAR ── -->
        <div id="sidebar-container" style="display:contents;"></div>
        <script src="sidebar.js"></script>

        <div style="flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0;">
            <!-- TOP BAR -->
            <header class="glass-topbar" style="display:flex; align-items:center; justify-content:space-between; padding:12px 26px; height:56px; flex-shrink:0;">
                <div style="font-size:15px; font-weight:700; color:#0f172a; align-items: start;">Insurance Claims Portal</div>
                <div style="display:flex; align-items:center; gap:14px;">
                    <!-- Bell -->
                    <button style="position:relative; background:none; border:none; cursor:pointer; color:#64748b; display:flex; align-items:center;">
                        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                        </svg>
                        <span style="position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:#ef4444;border-radius:50%;border:1.5px solid white;"></span>
                    </button>
                    <!-- User -->
                    <div style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                        <div class="avatar">RK</div>
                        <div style="text-align:right;">
                            <div style="font-size:13px; font-weight:600; color:#0f172a; line-height:1.2;">John Smith</div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- CONTENT -->
            <main class="glass-main" style="flex:1; overflow-y:auto; padding:28px 28px;">
                <h1 style="font-size:22px; font-weight:700; color:#0f172a; margin:0 0 24px;">Outstanding Updates</h1>
                <div style="background:white; border:1.5px solid #e2e8f0; border-radius:12px; padding:24px; box-shadow:0 1px 4px rgba(0,0,0,0.04);">
                    <p style="color:#64748b; font-size:14px;">This page is currently under construction. Future updates and components will be added here.</p>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
